<h1>📚 Flowchart Sistem Perpustakaan</h1>
<p class="subtitle">Final Project UAS — Aplikasi Manajemen dengan Database Flat File (.CSV) | Python</p>

<div class="legend">

<!-- 5 kolom struktur data -->
<rect x="50" y="1066" width="148" height="164" rx="7" fill="#1D6FA4"/>

<text class="sub" x="124" y="1106">Daftar buku</text>
<text class="sub" x="124" y="1124">• append() O(n)</text>
<text class="sub" x="124" y="1140">• find() O(n)</text>
<text class="sub" x="124" y="1156">• delete() O(n)</text>
<text class="sub" x="124" y="1172">• search_title()</text>
<text class="sub" x="124" y="1188">• search_author()</text>

<text class="sub" x="288" y="1124">LIFO — Last In First Out</text>
<text class="sub" x="288" y="1140">• push() O(1)</text>
<text class="sub" x="288" y="1156">• pop() O(1)</text>
<text class="sub" x="288" y="1172">• peek() O(1)</text>

<text class="sub" x="452" y="1156">• dequeue() O(1)</text>

<rect x="542" y="1066" width="148" height="164" rx="7" fill="#D4880A"/>
<text class="lbl" x="616" y="1088">Hash Map</text>
<text class="sub" x="616" y="1106">Data anggota</text>
<text class="sub" x="616" y="1124">Lookup cepat O(1)</text>
<text class="sub" x="616" y="1140">• put() O(1)</text>
<text class="sub" x="616" y="1156">• get() O(1)</text>
<text class="sub" x="616" y="1172">• delete() O(1)</text>

<rect x="706" y="1066" width="148" height="164" rx="7" fill="#2E8B57"/>

<text class="sub" x="780" y="1140">• insert() O(log n)</text>
<text class="sub" x="780" y="1156">• inorder() O(n)</text>
<text class="sub" x="780" y="1172">• search() O(log n)</text>
